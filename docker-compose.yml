services:
  postgres:
    image: postgres:16
    container_name: tartware-postgres
    restart: always
    # ── Performance tuning for 20K ops/sec ──────────────────────────────────
    # Tune these via environment overrides (PG_SHARED_BUFFERS, etc.) in .env.
    # Defaults below are sized for a 16 GB dev host; scale for production.
    command:
      - postgres
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-4GB}
      - -c
      - work_mem=${PG_WORK_MEM:-32MB}
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-512MB}
      - -c
      - wal_buffers=${PG_WAL_BUFFERS:-64MB}
      - -c
      - max_wal_size=${PG_MAX_WAL_SIZE:-4GB}
      - -c
      - min_wal_size=${PG_MIN_WAL_SIZE:-512MB}
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - synchronous_commit=${PG_SYNCHRONOUS_COMMIT:-off}
      - -c
      - random_page_cost=${PG_RANDOM_PAGE_COST:-1.1}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-12GB}
      - -c
      - max_connections=${PG_MAX_CONNECTIONS:-300}
      - -c
      - autovacuum_max_workers=${PG_AUTOVACUUM_MAX_WORKERS:-5}
      - -c
      - autovacuum_vacuum_scale_factor=${PG_AUTOVACUUM_VACUUM_SCALE:-0.05}
      - -c
      - autovacuum_analyze_scale_factor=${PG_AUTOVACUUM_ANALYZE_SCALE:-0.025}
      - -c
      - autovacuum_vacuum_cost_delay=${PG_AUTOVACUUM_COST_DELAY:-0}
      - -c
      - default_statistics_target=200
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - log_min_duration_statement=${PG_LOG_MIN_DURATION:-100}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      # Tartware initialization settings
      TARTWARE_DROP_EXISTING: ${TARTWARE_DROP_EXISTING:-true}
      TARTWARE_RUN_VERIFICATION: ${TARTWARE_RUN_VERIFICATION:-false}
      TARTWARE_BACKUP_BEFORE_DROP: ${TARTWARE_BACKUP_BEFORE_DROP:-false}
    ports:
      - "5432:5432"
    volumes:
      - tartware_postgres_data:/var/lib/postgresql/data
      # Mount all scripts for initialization (read-write for chmod)
      - ./scripts:/docker-entrypoint-initdb.d/scripts
      # Mount custom entrypoint
      - ./scripts/docker/docker-entrypoint-custom.sh:/usr/local/bin/docker-entrypoint-custom.sh
    entrypoint: ["/bin/bash", "/usr/local/bin/docker-entrypoint-custom.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tartware_network

  # ── PgBouncer — connection pooler ──────────────────────────────────────────
  # Transaction-mode pooling allows 300 real PG connections to serve 2000+
  # app connections. All services should connect via pgbouncer:5433.
  # Direct port 5432 is kept for DBA/admin access only.
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: tartware-pgbouncer
    restart: always
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: "5432"
      DATABASES_USER: postgres
      DATABASES_PASSWORD: postgres
      DATABASES_DBNAME: tartware
      # Transaction pooling is essential for 20K ops/sec with RLS SET LOCAL
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "2000"
      PGBOUNCER_DEFAULT_POOL_SIZE: "25"
      PGBOUNCER_MIN_POOL_SIZE: "5"
      PGBOUNCER_RESERVE_POOL_SIZE: "10"
      PGBOUNCER_RESERVE_POOL_TIMEOUT: "3"
      PGBOUNCER_MAX_DB_CONNECTIONS: "250"
      PGBOUNCER_SERVER_IDLE_TIMEOUT: "600"
      PGBOUNCER_CLIENT_IDLE_TIMEOUT: "0"
      PGBOUNCER_SERVER_CONNECT_TIMEOUT: "5"
      PGBOUNCER_QUERY_TIMEOUT: "30"
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: "extra_float_digits,options"
      PGBOUNCER_AUTH_TYPE: trust
      PGBOUNCER_AUTH_FILE: /etc/pgbouncer/userlist.txt
      PGBOUNCER_ADMIN_USERS: postgres
      PGBOUNCER_STATS_USERS: postgres
    volumes:
      - ./docker/pgbouncer-userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "5433:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tartware_network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tartware-redis
    restart: always
    command: redis-server --requirepass redis_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - tartware_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tartware_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: tartware-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - tartware_network
    volumes:
      - tartware_zookeeper_data:/bitnami/zookeeper
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: tartware-kafka
    restart: always
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 12
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - tartware_network
    volumes:
      - tartware_kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tartware-kafka-ui
    restart: always
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tartware-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    networks:
      - tartware_network

  opensearch-node:
    image: opensearchproject/opensearch:2.13.0
    container_name: tartware-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Admin123#ChangeMe"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - tartware_opensearch_data:/usr/share/opensearch/data
    networks:
      - tartware_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: tartware-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      opensearch-node:
        condition: service_healthy
    networks:
      - tartware_network

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: tartware-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - tartware_prometheus_data:/prometheus
    networks:
      - tartware_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: tartware-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3100:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - tartware_grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - tartware_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tartware-pgadmin
    restart: always
    # Expose PGAdmin UI on host port (override with PGADMIN_PORT env); default 5555 -> container 80
    ports:
      - "${PGADMIN_PORT:-5555}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    # Persistent storage for PGAdmin (keeps settings/sessions)
    volumes:
      - tartware_pgadmin_data:/var/lib/pgadmin
    networks:
      - tartware_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tartware_postgres_data:
    name: tartware_postgres_data
    driver: local
  tartware_redis_data:
    name: tartware_redis_data
    driver: local
  tartware_zookeeper_data:
    name: tartware_zookeeper_data
    driver: local
  tartware_kafka_data:
    name: tartware_kafka_data
    driver: local
  tartware_opensearch_data:
    name: tartware_opensearch_data
    driver: local
  tartware_prometheus_data:
    name: tartware_prometheus_data
    driver: local
  tartware_grafana_data:
    name: tartware_grafana_data
    driver: local
  tartware_pgadmin_data:
    name: tartware_pgadmin_data
    driver: local
  # pgbouncer is stateless — no volume needed

networks:
  tartware_network:
    name: tartware_network
    driver: bridge
