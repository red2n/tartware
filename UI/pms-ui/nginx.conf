server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable HTTP/2 (requires reverse proxy or direct HTTPS termination)
    # When behind a TLS-terminating load balancer, HTTP/2 upstream is handled there

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # Cache hashed assets aggressively (Angular outputs files like chunk-XXXX.js, styles-XXXX.css)
    location ~* \-[A-Za-z0-9]+\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets (icons, fonts, images)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # index.html and manifest — never cache (allows SW updates)
    location ~* (index\.html|manifest\.webmanifest|ngsw\.json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy API calls to host backend
    location /v1/ {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for notification stream
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Angular SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
