<h2 mat-dialog-title>
  <mat-icon class="dialog-title-icon">manage_accounts</mat-icon>
  Edit User
</h2>

<mat-dialog-content>
  <div class="form-fields">
    <!-- User info (read-only) -->
    <section class="form-section">
      <span class="form-section-title">User Details</span>
      <div class="user-info-card">
        <div class="user-info-row">
          <span class="field-label">Name</span>
          <span class="field-value-locked">{{ fullName }}</span>
        </div>
        <div class="user-info-row">
          <span class="field-label">Username</span>
          <span class="field-value-locked">{{ data.user.username }}</span>
        </div>
        <div class="user-info-row">
          <span class="field-label">Email</span>
          <span class="field-value-locked">{{ data.user.email }}</span>
        </div>
      </div>
    </section>

    <!-- Access control -->
    <section class="form-section">
      <span class="form-section-title">Access Control</span>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label" for="eu-role">Role</label>
          <select
            id="eu-role"
            class="field-input"
            [(ngModel)]="selectedRole"
            [disabled]="saving()">
            @for (r of roles; track r.value) {
              <option [value]="r.value">{{ r.label }}</option>
            }
          </select>
          <span class="field-hint">Controls permissions and access level</span>
        </div>
        <div class="field-group">
          <label class="field-label">Status</label>
          <label class="toggle-label">
            <input
              type="checkbox"
              [(ngModel)]="isActive"
              [disabled]="saving()" />
            {{ isActive ? 'Active — user can log in' : 'Inactive — access revoked' }}
          </label>
        </div>
      </div>
    </section>

    <!-- Password reset -->
    <section class="form-section">
      <span class="form-section-title">Security</span>
      <div class="reset-row">
        <div>
          <span class="field-label">Password</span>
          <span class="field-hint">Reset to the default temporary password</span>
        </div>
        <button
          class="btn btn-danger btn-sm"
          (click)="resetPassword()"
          [disabled]="saving()">
          @if (saving()) {
            <mat-spinner diameter="14"></mat-spinner>
          } @else {
            <mat-icon>lock_reset</mat-icon>
          }
          Reset Password
        </button>
      </div>
    </section>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button class="btn btn-outline" (click)="cancel()" [disabled]="saving()">Cancel</button>
  <button class="btn btn-primary" (click)="save()" [disabled]="!hasChanges || saving()">
    @if (saving()) {
      <mat-spinner diameter="16"></mat-spinner>
    } @else {
      <mat-icon>save</mat-icon>
    }
    Save Changes
  </button>
</mat-dialog-actions>
