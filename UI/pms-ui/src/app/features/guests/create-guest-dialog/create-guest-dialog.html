<h2 mat-dialog-title>
  <mat-icon class="dialog-title-icon">person_add</mat-icon>
  {{ 'New Guest Profile' | translate }}
</h2>

<mat-dialog-content>
  <div class="form-fields">
    <app-guest-form-fields
      idPrefix="cg"
      [saving]="saving()"
      [fieldErrors]="fieldErrors()"
      [touched]="touched"
      [firstName]="firstName"
      [lastName]="lastName"
      [email]="email"
      [title]="title"
      [phone]="phone"
      [nationality]="nationality"
      [gender]="gender"
      [dateOfBirth]="dateOfBirth"
      [companyName]="companyName"
      [vipStatus]="vipStatus"
      [loyaltyTier]="loyaltyTier"
      [emailError]="emailError"
      [phoneError]="phoneError"
      (firstNameChange)="firstName = $event"
      (lastNameChange)="lastName = $event"
      (emailChange)="email = $event"
      (titleChange)="title = $event"
      (phoneChange)="phone = $event"
      (nationalityChange)="nationality = $event"
      (genderChange)="gender = $event"
      (dateOfBirthChange)="dateOfBirth = $event"
      (companyNameChange)="companyName = $event"
      (vipStatusChange)="vipStatus = $event"
      (loyaltyTierChange)="loyaltyTier = $event"
      (markTouched)="markTouched($event)" />
  </div>
</mat-dialog-content>

<app-dialog-actions
  [saving]="saving()"
  [valid]="isValid"
  saveLabel="Create guest"
  savingLabel="Creating…"
  (cancel)="cancel()"
  (save)="save()" />
