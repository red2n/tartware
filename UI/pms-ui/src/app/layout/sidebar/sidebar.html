<aside class="sidebar" [class.collapsed]="collapsed()">

  <nav class="sidebar-nav">
    @for (item of primaryNavItems(); track item.label) {
      <ng-container *ngTemplateOutlet="navItemTpl; context: { $implicit: item }" />
    }
  </nav>

  <nav class="sidebar-nav-secondary">
    @for (item of secondaryNavItems(); track item.label) {
      <ng-container *ngTemplateOutlet="navItemTpl; context: { $implicit: item }" />
    }
  </nav>

  <div class="sidebar-footer">
    <button class="collapse-toggle" (click)="toggleCollapse.emit()" [attr.aria-label]="(collapsed() ? 'Expand sidebar' : 'Collapse sidebar') | translate">
      <app-icon [name]="collapsed() ? 'chevron_right' : 'chevron_left'" />
    </button>
  </div>
</aside>

<ng-template #navItemTpl let-item>
  @if (item.children) {
    <button class="nav-item nav-parent"
            [class.nav-item-active]="isParentActive(item)"
            [pTooltip]="collapsed() ? (item.label | translate) : ''"
            tooltipPosition="right"
            [attr.aria-label]="item.label | translate"
            (click)="onParentClick(item)">
      <app-icon class="nav-icon" [name]="item.icon" />
      @if (!collapsed()) {
        <span class="nav-label">{{ item.label | translate }}</span>
      }
    </button>
  } @else {
    <a class="nav-item"
       [routerLink]="item.route"
       routerLinkActive="nav-item-active"
       [pTooltip]="collapsed() ? (item.label | translate) : ''"
       tooltipPosition="right"
       [attr.aria-label]="item.label | translate">
      <app-icon class="nav-icon" [name]="item.icon" />
      @if (!collapsed()) {
        <span class="nav-label">{{ item.label | translate }}</span>
      }
    </a>
  }
</ng-template>
