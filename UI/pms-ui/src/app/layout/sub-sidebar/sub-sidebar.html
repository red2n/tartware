<aside class="sub-sidebar" [class.collapsed]="collapsed()">
  <div class="sub-sidebar-header">
    @if (!collapsed()) {
      <span class="sub-sidebar-title">{{ parentLabel() | translate }}</span>
    } @else {
      <app-icon class="header-icon" [pTooltip]="parentLabel() | translate" tooltipPosition="left" [name]="parentIcon()" />
    }
  </div>

  <nav class="sub-sidebar-nav">
    @for (item of items(); track item.route) {
      <a class="nav-item"
         [routerLink]="item.route"
         routerLinkActive="nav-item-active"
         [pTooltip]="collapsed() ? (item.label | translate) : ''"
         tooltipPosition="left">
        <app-icon class="nav-icon" [name]="item.icon" />
        @if (!collapsed()) {
          <span class="nav-label">{{ item.label | translate }}</span>
        }
      </a>
    }
  </nav>

  <div class="sub-sidebar-footer">
    <button class="collapse-toggle" (click)="toggleCollapse.emit()">
      <app-icon [name]="collapsed() ? 'chevron_left' : 'chevron_right'" />
    </button>
  </div>
</aside>
