<div class="activity-bar">
  <nav class="activity-bar-top">
    @for (item of primaryNavItems(); track item.label) {
      <button class="activity-bar-item"
              [class.active]="isActive(item)"
              [pTooltip]="item.label | translate"
              tooltipPosition="right"
              (click)="onItemClick(item)">
        <app-icon [name]="item.icon" />
      </button>
    }
  </nav>

  <nav class="activity-bar-bottom">
    @for (item of secondaryNavItems(); track item.label) {
      <button class="activity-bar-item"
              [class.active]="isActive(item)"
              [pTooltip]="item.label | translate"
              tooltipPosition="right"
              (click)="onItemClick(item)">
        <app-icon [name]="item.icon" />
      </button>
    }
  </nav>
</div>
