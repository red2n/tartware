<a class="skip-link" href="#main-content">{{ 'Skip to content' | translate }}</a>
<div class="shell" [class.sidebar-collapsed]="sidebarCollapsed()">
  @defer (on idle) {
    <app-sidebar
      [collapsed]="sidebarCollapsed()"
      [activeParentLabel]="activeParent()?.label ?? null"
      (toggleCollapse)="toggleSidebar()"
      (parentSelect)="onParentSelect($event)" />
  } @placeholder {
    <aside class="sidebar-placeholder"></aside>
  }

  <div class="main-area">
    @defer (on idle) {
      <app-topbar (menuToggle)="toggleSidebar()" />
    } @placeholder {
      <div class="topbar-placeholder"></div>
    }

    <main id="main-content" class="content-area scroll-container" tabindex="-1">
      <router-outlet />
    </main>

    @if (statusBarVisible()) {
      <app-status-bar />
    }
  </div>

  @if (activeParent(); as parent) {
    <app-sub-sidebar
      [parentLabel]="parent.label"
      [parentIcon]="parent.icon"
      [items]="parent.children!"
      [collapsed]="rightDockCollapsed()"
      (toggleCollapse)="toggleRightDock()" />
  }
</div>
<app-toast-container />
