<!doctype html>
<html lang="en" data-color-mode="dark" data-light-theme="light" data-dark-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Tartware PMS</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0969da">
  <meta name="description" content="Property Management System by Tartware">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap"></noscript>
  <script>
    // Prevent FOUC: apply saved theme before Angular bootstraps
    (function() {
      var mode = localStorage.getItem('theme_mode');
      var isDark;
      if (mode === 'LIGHT') isDark = false;
      else if (mode === 'DARK') isDark = true;
      else isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var t = isDark ? 'dark' : 'light';
      var el = document.documentElement;
      el.setAttribute('data-color-mode', t);
      el.setAttribute('data-light-theme', t);
      el.setAttribute('data-dark-theme', t);
      el.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
