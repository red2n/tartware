name: CI · OpenAPI Spec

on:
  push:
    branches: [main, develop]
    paths:
      - 'Apps/*/src/routes/**'
      - 'Apps/*/src/server.ts'
      - 'Apps/openapi-utils/**'
      - 'scripts/export-openapi.mjs'
      - 'scripts/validate-openapi.mjs'
  pull_request:
    paths:
      - 'Apps/*/src/routes/**'
      - 'Apps/*/src/server.ts'
      - 'Apps/openapi-utils/**'
      - 'scripts/export-openapi.mjs'
      - 'scripts/validate-openapi.mjs'
  workflow_dispatch:

jobs:
  openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build proto-types
        working-directory: proto
        run: pnpm run build

      - name: Build all packages
        run: pnpm run build

      - name: Export OpenAPI specs
        run: pnpm run export:openapi

      - name: Validate OpenAPI specs
        run: pnpm run validate:openapi

      - name: Upload OpenAPI specs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-specs
          path: docs/openapi/*.json
          if-no-files-found: warn
